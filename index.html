const UNIT_COLORS = { 4:'#4CAF50', 5:'#2196F3', 6:'#FF9800', 7:'#9C27B0', 8:'#F44336', 9:'#795548' };
function getColor(u){ return UNIT_COLORS[u] || UNIT_COLORS[9]; }

// ── Unit toggle buttons ──────────────────────────────────────────
const UNITS = [4,5,6,7,8,9];
const activeUnits = new Set(UNITS);

const togglesEl = document.getElementById('unit-toggles');
UNITS.forEach(u => {
  const btn = document.createElement('button');
  btn.className = 'unit-btn';
  btn.style.background = getColor(u);
  btn.style.borderColor = getColor(u);
  btn.textContent = u === 9 ? '9+' : u;
  btn.dataset.unit = u;
  btn.title = `Toggle ${u === 9 ? '9+' : u} unit properties`;
  btn.onclick = () => {
    if(activeUnits.has(u)){
      // don't allow deselecting all
      if(activeUnits.size === 1) return;
      activeUnits.delete(u);
      btn.classList.add('off');
    } else {
      activeUnits.add(u);
      btn.classList.remove('off');
    }
    applyFilter();
  };
  togglesEl.appendChild(btn);
});

// ── Map setup ─────────────────────────────────────────────────────
function makeIcon(units){
  const color = getColor(units);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34">
    <path d="M13 0C5.82 0 0 5.82 0 13c0 8.94 13 21 13 21S26 21.94 26 13C26 5.82 20.18 0 13 0z" fill="${color}" stroke="white" stroke-width="1.5"/>
    <text x="13" y="18" text-anchor="middle" font-size="10" font-weight="bold" fill="white" font-family="Arial,sans-serif">${units>=9?'9+':units}</text>
  </svg>`;
  return L.divIcon({ html: svg, className:'', iconSize:[26,34], iconAnchor:[13,34], popupAnchor:[0,-34] });
}

function fmtPrice(p){
  if(!p||p<=1) return 'N/A';
  if(p>=1000000) return '$'+(p/1000000).toFixed(2)+'M';
  if(p>=1000) return '$'+(p/1000).toFixed(0)+'K';
  return '$'+p.toLocaleString();
}
function fmtDate(d){
  if(!d) return 'N/A';
  const [y,m] = d.split('-');
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return (mo[parseInt(m)-1]||'') + ' ' + y;
}
function fmtPhone(p){
  if(!p) return 'N/A';
  const d = p.replace(/\D/g,'');
  if(d.length===10) return '('+d.slice(0,3)+') '+d.slice(3,6)+'-'+d.slice(6);
  return p;
}
function propType(u){ if(u<=4) return 'Small Multifamily'; if(u<=6) return 'Mid Multifamily'; return 'Multifamily'; }

const map = L.map('map').setView([39.948,-75.163],14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>',maxZoom:19}).addTo(map);

const legend = L.control({position:'bottomright'});
legend.onAdd = ()=>{
  const div = L.DomUtil.create('div','legend');
  div.innerHTML = '<h4>Units</h4>'+[4,5,6,7,8,9].map(u=>
    `<div class="legend-item"><div class="legend-dot" style="background:${getColor(u)}"></div><span>${u===9?'9+':u} units</span></div>`
  ).join('');
  return div;
};
legend.addTo(map);

let allMarkers = [];
let geocodedData = [];

// Geocoding removed — coordinates pre-baked into data

// ── Build zip dropdown after geocoding ───────────────────────────
function buildZipDropdown(){
  const zips = [...new Set(geocodedData.map(p=>p.postal_code).filter(Boolean))].sort();
  const sel = document.getElementById('filter-zip');
  zips.forEach(z => {
    const o = document.createElement('option');
    o.value = z; o.textContent = z;
    sel.appendChild(o);
  });
}

function loadAll(){
  // Coordinates pre-baked — loads instantly, no geocoding needed
  geocodedData = PROPERTIES.filter(p => p.lat && p.lng);
  document.getElementById('loading').style.display='none';
  buildZipDropdown();
  renderMarkers();
}

// ── Main filter + render ──────────────────────────────────────────
function renderMarkers(){
  allMarkers.forEach(m=>map.removeLayer(m));
  allMarkers=[];

  const search   = document.getElementById('search-box').value.toLowerCase().trim();
  const zipVal   = document.getElementById('filter-zip').value;
  const dateFrom = parseInt(document.getElementById('date-from').value) || 0;
  const dateTo   = parseInt(document.getElementById('date-to').value)   || 9999;
  const priceMin = (parseFloat(document.getElementById('price-min').value) || 0) * 1000;
  const priceMax = (parseFloat(document.getElementById('price-max').value) || Infinity) * 1000;

  const filtered = geocodedData.filter(p=>{
    // Unit toggle
    const unitKey = p.units >= 9 ? 9 : p.units;
    if(!activeUnits.has(unitKey)) return false;

    // Zip
    if(zipVal !== 'all' && p.postal_code !== zipVal) return false;

    // Sale year range
    if(p.last_sale_date){
      const yr = parseInt(p.last_sale_date.split('-')[0]);
      if(yr < dateFrom || yr > dateTo) return false;
    } else {
      // if "from" is set and property has no date, exclude it
      if(dateFrom > 0) return false;
    }

    // Price range (skip N/A prices only if user specified a min)
    if(p.last_sale_price > 1){
      if(p.last_sale_price < priceMin) return false;
      if(p.last_sale_price > priceMax) return false;
    } else {
      if(priceMin > 0) return false;
    }

    // Text search
    if(search){
      const hay = (p.address+' '+(p.contact||'')).toLowerCase();
      if(!hay.includes(search)) return false;
    }

    return true;
  });

  filtered.forEach(p=>{
    const m = L.marker([p.lat,p.lng],{icon:makeIcon(p.units)});
    const popup = `<div class="popup-header">${p.address}</div>
<div class="popup-inner">
  <div class="popup-row"><span class="label">Units</span><span class="value">${p.units}</span></div>
  <div class="popup-row"><span class="label">Type</span><span class="value">${propType(p.units)}</span></div>
  <div class="popup-row"><span class="label">Last Sale</span><span class="value">${fmtDate(p.last_sale_date)}</span></div>
  <div class="popup-row"><span class="label">Sale Price</span><span class="value">${fmtPrice(p.last_sale_price)}</span></div>
  ${p.contact ? `<div class="popup-row"><span class="label">Contact</span><span class="value">${p.contact}</span></div>` : ''}
  ${p.phone  ? `<div class="popup-row"><span class="label">Phone</span><span class="value">${fmtPhone(p.phone)}</span></div>` : ''}
  <div class="popup-row"><span class="label">Zip Code</span><span class="value">${p.postal_code||'N/A'}</span></div>
</div>`;
    m.bindPopup(popup,{maxWidth:260});
    m.addTo(map);
    allMarkers.push(m);
  });
  document.getElementById('visible-count').textContent = filtered.length;
}

function applyFilter(){ renderMarkers(); }

function clearFilters(){
  // Reset unit toggles
  UNITS.forEach(u => {
    activeUnits.add(u);
    document.querySelector(`.unit-btn[data-unit="${u}"]`).classList.remove('off');
  });
  document.getElementById('filter-zip').value   = 'all';
  document.getElementById('date-from').value    = '';
  document.getElementById('date-to').value      = '';
  document.getElementById('price-min').value    = '';
  document.getElementById('price-max').value    = '';
  document.getElementById('search-box').value   = '';
  renderMarkers();
}

loadAll();
</script>
